<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Matching Game</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .draggable {
            cursor: grab;
            transition: all 0.2s;
        }
        .draggable:active {
            cursor: grabbing;
            opacity: 0.8;
        }
        .drop-zone {
            min-height: 50px;
            border: 2px dashed #ccc;
            transition: all 0.3s;
        }
        .drop-zone.drag-over {
            background-color: #e0f2fe;
            border-color: #0284c7;
        }
        .matched {
            background-color: #86efac !important;
            border-color: #22c55e !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

        const makeLevel = (pairs) => ({
            left: shuffle(pairs),
            right: shuffle(pairs.map(p => ({ ...p })))
        });

        const data = {
            easy: [
                { id: 1, left: "Shoes", right: "Socks" },
                { id: 2, left: "Toothbrush", right: "Toothpaste" },
                { id: 3, left: "Rain", right: "Umbrella" },
                { id: 4, left: "Dog", right: "Bone" },
                { id: 5, left: "Pen", right: "Paper" },
                { id: 6, left: "Cup", right: "Saucer" },
                { id: 7, left: "Bed", right: "Pillow" },
                { id: 8, left: "Car", right: "Road" },
                { id: 9, left: "Knife", right: "Fork" },
                { id: 10, left: "Lock", right: "Key" }
            ],
            medium: [
                { id: 11, left: "School", right: "Bag" },
                { id: 12, left: "Classroom", right: "Desk" },
                { id: 13, left: "Playground", right: "Ball" },
                { id: 14, left: "Teacher", right: "Student" },
                { id: 15, left: "Lunchbox", right: "Food" },
                { id: 16, left: "Library", right: "Books" },
                { id: 17, left: "Home", right: "Sofa" },
                { id: 18, left: "Bathroom", right: "Soap" },
                { id: 19, left: "Kitchen", right: "Fridge" },
                { id: 20, left: "Bike", right: "Helmet" }
            ],
            hard: [
                { id: 21, left: "Sun", right: "Moon" },
                { id: 22, left: "Fire", right: "Smoke" },
                { id: 23, left: "Question", right: "Answer" },
                { id: 24, left: "Day", right: "Night" },
                { id: 25, left: "Hot", right: "Cold" },
                { id: 26, left: "Buy", right: "Sell" },
                { id: 27, left: "Parent", right: "Child" },
                { id: 28, left: "Open", right: "Close" },
                { id: 29, left: "Before", right: "After" },
                { id: 30, left: "Give", right: "Take" }
            ]
        };

        function Game() {
            const [level, setLevel] = useState("easy");
            const [board, setBoard] = useState(makeLevel(data.easy));
            const [dragItem, setDragItem] = useState(null);
            const [matches, setMatches] = useState([]);
            const [feedback, setFeedback] = useState("");
            const [dragOver, setDragOver] = useState(null);

            useEffect(() => {
                setBoard(makeLevel(data[level]));
                setMatches([]);
                setFeedback("");
            }, [level]);

            const playSuccess = () => {
                const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
                audio.play().catch(() => {});
            };

            const playError = () => {
                const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
                audio.play().catch(() => {});
            };

            const handleDrop = (target) => {
                if (!dragItem) return;

                if (dragItem.id === target.id) {
                    setMatches([...matches, dragItem.id]);
                    setFeedback("✅ Ka pai! Correct match!");
                    playSuccess();
                } else {
                    setFeedback("❌ Try again — think about what goes together.");
                    playError();
                }
                setDragItem(null);
                setDragOver(null);
            };

            return (
                <div className="game-container">
                    <div className="bg-white rounded-2xl shadow-2xl p-8">
                        <h1 className="text-5xl font-bold text-center mb-6">🎯 Matching Game</h1>

                        <div className="flex justify-center gap-3 mb-6">
                            {Object.keys(data).map((lvl) => (
                                <button
                                    key={lvl}
                                    onClick={() => setLevel(lvl)}
                                    className={`px-6 py-3 rounded-xl font-bold text-lg transition-all ${
                                        level === lvl
                                            ? "bg-blue-600 text-white scale-110"
                                            : "bg-blue-200 text-blue-800 hover:bg-blue-300"
                                    }`}
                                >
                                    {lvl.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        {feedback && (
                            <div className="text-center text-2xl font-bold mb-6 p-3 bg-yellow-100 rounded-lg">
                                {feedback}
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-8 mb-6">
                            {/* LEFT - Draggable Items */}
                            <div>
                                <h2 className="text-xl font-bold mb-4 text-gray-700">Drag from here:</h2>
                                <div className="space-y-3">
                                    {board.left.map((item) => (
                                        <div
                                            key={item.id}
                                            draggable
                                            onDragStart={() => setDragItem(item)}
                                            onDragEnd={() => setDragItem(null)}
                                            className={`draggable p-4 rounded-xl shadow-lg bg-gradient-to-r from-blue-400 to-blue-500 text-white font-bold text-lg ${
                                                matches.includes(item.id) ? "opacity-30 cursor-not-allowed" : ""
                                            }`}
                                        >
                                            {item.left}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* RIGHT - Drop Targets */}
                            <div>
                                <h2 className="text-xl font-bold mb-4 text-gray-700">Drop here:</h2>
                                <div className="space-y-3">
                                    {board.right.map((item) => (
                                        <div
                                            key={item.id}
                                            onDragOver={(e) => {
                                                e.preventDefault();
                                                setDragOver(item.id);
                                            }}
                                            onDragLeave={() => setDragOver(null)}
                                            onDrop={() => handleDrop(item)}
                                            className={`drop-zone p-4 rounded-xl font-bold text-lg transition-all ${
                                                matches.includes(item.id)
                                                    ? "matched bg-green-200 border-green-500"
                                                    : "border-gray-300 bg-gray-50"
                                            } ${dragOver === item.id ? "drag-over" : ""}`}
                                        >
                                            {matches.includes(item.id) ? `✅ ${item.right}` : item.right}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {matches.length === data[level].length && matches.length > 0 && (
                            <div className="p-6 bg-gradient-to-r from-green-400 to-green-500 rounded-xl text-center font-bold text-2xl text-white">
                                🎉 All matched! Ka pai! 🎉
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<Game />, document.getElementById("root"));
    </script>
</body>
</html>
