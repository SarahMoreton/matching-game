<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Matching Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            font-size: 4em;
            margin-bottom: 40px;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .level-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .level-buttons button {
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: linear-gradient(135deg, #93c5fd, #60a5fa);
            color: #1e40af;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .level-buttons button:hover {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .level-buttons button.active {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .feedback {
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 15px;
            background: #fef3c7;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #fcd34d;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feedback.show {
            opacity: 1;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .column h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #555;
            text-align: center;
        }

        .items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .draggable {
            padding: 18px;
            border-radius: 12px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            cursor: grab;
            user-select: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
            border: 3px solid transparent;
        }

        .draggable:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        .draggable:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .draggable.matched {
            opacity: 0.25;
            cursor: not-allowed;
            background: linear-gradient(135deg, #c1c1c1, #a0a0a0);
        }

        .drop-zone {
            padding: 18px;
            border-radius: 12px;
            border: 3px dashed #ccc;
            background: #f9fafb;
            font-weight: bold;
            font-size: 1.2em;
            color: #333;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .drop-zone:hover {
            background: #f3f4f6;
            border-color: #b0b0b0;
        }

        .drop-zone.drag-over {
            background: linear-gradient(135deg, #e0f2fe, #cffafe);
            border-color: #0284c7;
            border-style: solid;
            box-shadow: 0 0 20px rgba(2, 132, 199, 0.3);
            transform: scale(1.02);
        }

        .drop-zone.matched {
            background: linear-gradient(135deg, #bbf7d0, #86efac);
            border-color: #22c55e;
            border-style: solid;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
            color: #15803d;
            font-weight: bold;
        }

        .completion {
            padding: 30px;
            border-radius: 15px;
            background: linear-gradient(135deg, #34d399, #10b981);
            color: white;
            text-align: center;
            font-size: 2.2em;
            font-weight: bold;
            display: none;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            border: 3px solid #059669;
        }

        .completion.show {
            display: block;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            h1 {
                font-size: 2.5em;
            }
            .container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Matching Game</h1>

        <div class="level-buttons">
            <button class="level-btn active" data-level="easy">🟢 EASY</button>
            <button class="level-btn" data-level="medium">🟡 MEDIUM</button>
            <button class="level-btn" data-level="hard">🔴 HARD</button>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="game-area">
            <div class="column">
                <h2>👈 Drag from here:</h2>
                <div class="items" id="left-items"></div>
            </div>

            <div class="column">
                <h2>👉 Drop here:</h2>
                <div class="items" id="right-items"></div>
            </div>
        </div>

        <div class="completion" id="completion">🎉 All matched! Ka pai! 🎉</div>
    </div>

    <script>
        const gameData = {
            easy: [
                { id: 1, left: "👟 Shoes", right: "🧦 Socks" },
                { id: 2, left: "🪥 Toothbrush", right: "😁 Toothpaste" },
                { id: 3, left: "☔ Rain", right: "☂️ Umbrella" },
                { id: 4, left: "🐕 Dog", right: "🦴 Bone" },
                { id: 5, left: "✏️ Pen", right: "📄 Paper" },
                { id: 6, left: "☕ Cup", right: "🛏️ Saucer" },
                { id: 7, left: "🛏️ Bed", right: "🛌 Pillow" },
                { id: 8, left: "🚗 Car", right: "🛣️ Road" },
                { id: 9, left: "🔪 Knife", right: "🍴 Fork" },
                { id: 10, left: "🔐 Lock", right: "🔑 Key" }
            ],
            medium: [
                { id: 11, left: "🏫 School", right: "🎒 Bag" },
                { id: 12, left: "🏫 Classroom", right: "📚 Desk" },
                { id: 13, left: "🎪 Playground", right: "⚽ Ball" },
                { id: 14, left: "👨‍🏫 Teacher", right: "👨‍🎓 Student" },
                { id: 15, left: "🍱 Lunchbox", right: "🍎 Food" },
                { id: 16, left: "📚 Library", right: "📖 Books" },
                { id: 17, left: "🏠 Home", right: "🛋️ Sofa" },
                { id: 18, left: "🚿 Bathroom", right: "🧼 Soap" },
                { id: 19, left: "🍳 Kitchen", right: "🧊 Fridge" },
                { id: 20, left: "🚲 Bike", right: "🪖 Helmet" }
            ],
            hard: [
                { id: 21, left: "☀️ Sun", right: "🌙 Moon" },
                { id: 22, left: "🔥 Fire", right: "💨 Smoke" },
                { id: 23, left: "❓ Question", right: "✅ Answer" },
                { id: 24, left: "🌅 Day", right: "🌙 Night" },
                { id: 25, left: "🔥 Hot", right: "❄️ Cold" },
                { id: 26, left: "🛒 Buy", right: "💰 Sell" },
                { id: 27, left: "👨‍👩‍👧 Parent", right: "👧 Child" },
                { id: 28, left: "🔓 Open", right: "🔒 Close" },
                { id: 29, left: "⏪ Before", right: "⏩ After" },
                { id: 30, left: "🎁 Give", right: "🤲 Take" }
            ]
        };

        let currentLevel = "easy";
        let draggedItem = null;
        let matches = [];

        function shuffle(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function renderGame() {
            matches = [];
            document.getElementById("feedback").classList.remove("show");
            document.getElementById("completion").classList.remove("show");

            const pairs = gameData[currentLevel];
            const leftItems = shuffle([...pairs]);
            const rightItems = shuffle([...pairs]);

            // Render left (draggable)
            const leftContainer = document.getElementById("left-items");
            leftContainer.innerHTML = "";
            leftItems.forEach(item => {
                const div = document.createElement("div");
                div.className = "draggable";
                div.textContent = item.left;
                div.draggable = true;
                div.dataset.id = item.id;

                div.addEventListener("dragstart", (e) => {
                    draggedItem = item;
                    e.dataTransfer.effectAllowed = "copy";
                });

                div.addEventListener("dragend", (e) => {
                    draggedItem = null;
                });

                leftContainer.appendChild(div);
            });

            // Render right (drop zones)
            const rightContainer = document.getElementById("right-items");
            rightContainer.innerHTML = "";
            rightItems.forEach(item => {
                const div = document.createElement("div");
                div.className = "drop-zone";
                div.textContent = item.right;
                div.dataset.id = item.id;

                div.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = "copy";
                    div.classList.add("drag-over");
                });

                div.addEventListener("dragleave", () => {
                    div.classList.remove("drag-over");
                });

                div.addEventListener("drop", (e) => {
                    e.preventDefault();
                    div.classList.remove("drag-over");

                    if (!draggedItem) return;

                    if (draggedItem.id == item.id) {
                        matches.push(item.id);
                        showFeedback("✅ Ka pai! Correct match!", true);
                        playSound(true);
                        updateUI();
                    } else {
                        showFeedback("❌ Try again — think about what goes together.", false);
                        playSound(false);
                    }

                    draggedItem = null;
                });

                rightContainer.appendChild(div);
            });
        }

        function updateUI() {
            const pairs = gameData[currentLevel];

            // Update left items
            document.querySelectorAll(".draggable").forEach(el => {
                if (matches.includes(parseInt(el.dataset.id))) {
                    el.classList.add("matched");
                } else {
                    el.classList.remove("matched");
                }
            });

            // Update right items
            document.querySelectorAll(".drop-zone").forEach(el => {
                if (matches.includes(parseInt(el.dataset.id))) {
                    el.classList.add("matched");
                    const item = gameData[currentLevel].find(p => p.id == el.dataset.id);
                    el.textContent = "✅ " + item.right;
                } else {
                    el.classList.remove("matched");
                    const item = gameData[currentLevel].find(p => p.id == el.dataset.id);
                    el.textContent = item.right;
                }
            });

            // Check completion
            if (matches.length === pairs.length) {
                document.getElementById("completion").classList.add("show");
            }
        }

        function showFeedback(message, isCorrect) {
            const fb = document.getElementById("feedback");
            fb.textContent = message;
            fb.classList.add("show");
            setTimeout(() => fb.classList.remove("show"), 2000);
        }

        function playSound(isCorrect) {
            const url = isCorrect
                ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
                : "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg";
            new Audio(url).play().catch(() => {});
        }

        // Level button listeners
        document.querySelectorAll(".level-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentLevel = btn.dataset.level;
                renderGame();
            });
        });

        // Initial render
        renderGame();
    </script>
</body>
</html>
