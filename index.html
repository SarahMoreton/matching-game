<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Matching Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            font-size: 4em;
            margin-bottom: 40px;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .level-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .level-buttons button {
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: linear-gradient(135deg, #93c5fd, #60a5fa);
            color: #1e40af;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .level-buttons button:hover {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .level-buttons button.active {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .feedback {
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 15px;
            background: #fef3c7;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #fcd34d;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feedback.show {
            opacity: 1;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .column h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #555;
            text-align: center;
        }

        .items {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            cursor: grab;
            user-select: none;
            transition: all 0.3s ease;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .card:active {
            cursor: grabbing;
        }

        .card.matched {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }

        .draggable {
            cursor: grab;
            transition: transform 0.2s ease;
        }

        .draggable:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        .draggable:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .drop-zone {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 15px;
            border: 4px dashed #ccc;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .drop-zone:hover {
            border-color: #b0b0b0;
        }

        .drop-zone.drag-over {
            background: linear-gradient(135deg, #e0f2fe, #cffafe);
            border-color: #0284c7;
            border-style: solid;
            box-shadow: 0 0 30px rgba(2, 132, 199, 0.4);
            transform: scale(1.03);
        }

        .drop-zone.matched {
            border: 4px solid #22c55e;
            background: #bbf7d0;
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3);
        }

        .drop-zone-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .drop-zone.matched .drop-zone-image {
            display: block;
        }

        .drop-zone-label {
            position: absolute;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            color: #666;
        }

        .drop-zone.matched .drop-zone-label {
            display: none;
        }

        .completion {
            padding: 30px;
            border-radius: 15px;
            background: linear-gradient(135deg, #34d399, #10b981);
            color: white;
            text-align: center;
            font-size: 2.2em;
            font-weight: bold;
            display: none;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            border: 3px solid #059669;
        }

        .completion.show {
            display: block;
            animation: bounce 0.6s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            h1 {
                font-size: 2.5em;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Matching Game</h1>

        <div class="level-buttons">
            <button class="level-btn active" data-level="easy">🟢 EASY</button>
            <button class="level-btn" data-level="medium">🟡 MEDIUM</button>
            <button class="level-btn" data-level="hard">🔴 HARD</button>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="game-area">
            <div class="column">
                <h2>👈 Drag from here:</h2>
                <div class="items" id="left-items"></div>
            </div>

            <div class="column">
                <h2>👉 Drop here:</h2>
                <div class="items" id="right-items"></div>
            </div>
        </div>

        <div class="completion" id="completion">🎉 All matched! Ka pai! 🎉</div>
    </div>

    <script>
        const gameData = {
            easy: [
                { id: 1, left: "Shoes", right: "Socks", leftImg: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300&h=300&fit=crop" },
                { id: 2, left: "Toothbrush", right: "Toothpaste", leftImg: "https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1607945591411-07134e71a2a9?w=300&h=300&fit=crop" },
                { id: 3, left: "Rain", right: "Umbrella", leftImg: "https://images.unsplash.com/photo-1519692712057-3b5631b60eda?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1523634030851-78292e385706?w=300&h=300&fit=crop" },
                { id: 4, left: "Dog", right: "Bone", leftImg: "https://images.unsplash.com/photo-1633722715463-d30628519d84?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1572516675821-3bd3e19b6e16?w=300&h=300&fit=crop" },
                { id: 5, left: "Pen", right: "Paper", leftImg: "https://images.unsplash.com/photo-1578992414033-01f7a6c85dd9?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=300&h=300&fit=crop" },
                { id: 6, left: "Cup", right: "Saucer", leftImg: "https://images.unsplash.com/photo-1517701550927-30cf4ba20d4d?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1563428318-d2de6cf15a0f?w=300&h=300&fit=crop" },
                { id: 7, left: "Bed", right: "Pillow", leftImg: "https://images.unsplash.com/photo-1505693314967-be8bb8c58b18?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1584622181563-430f63602d4b?w=300&h=300&fit=crop" },
                { id: 8, left: "Car", right: "Road", leftImg: "https://images.unsplash.com/photo-1552820728-8ac41f1ce891?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1517457373614-b7152f800fd1?w=300&h=300&fit=crop" },
                { id: 9, left: "Knife", right: "Fork", leftImg: "https://images.unsplash.com/photo-1578695959904-dc4a8ccade1b?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1595521624185-f5e60bf11bba?w=300&h=300&fit=crop" },
                { id: 10, left: "Lock", right: "Key", leftImg: "https://images.unsplash.com/photo-1580456053570-d50b4265e29d?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1625948515291-69613efd103f?w=300&h=300&fit=crop" }
            ],
            medium: [
                { id: 11, left: "School", right: "Bag", leftImg: "https://images.unsplash.com/photo-1427504494636-20ede2a379a0?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300&h=300&fit=crop" },
                { id: 12, left: "Classroom", right: "Desk", leftImg: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=300&h=300&fit=crop" },
                { id: 13, left: "Playground", right: "Ball", leftImg: "https://images.unsplash.com/photo-1540575467063-178f50002311?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=300&h=300&fit=crop" },
                { id: 14, left: "Teacher", right: "Student", leftImg: "https://images.unsplash.com/photo-1544717278-ca5e3af8abd8?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=300&h=300&fit=crop" },
                { id: 15, left: "Lunchbox", right: "Food", leftImg: "https://images.unsplash.com/photo-1587786405128-e73c0a4b3028?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300&h=300&fit=crop" },
                { id: 16, left: "Library", right: "Books", leftImg: "https://images.unsplash.com/photo-150784272343-583f20270319?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=300&h=300&fit=crop" },
                { id: 17, left: "Home", right: "Sofa", leftImg: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=300&h=300&fit=crop" },
                { id: 18, left: "Bathroom", right: "Soap", leftImg: "https://images.unsplash.com/photo-1552321554-5fefe8c9ef14?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1598405867952-b8d1b63d913d?w=300&h=300&fit=crop" },
                { id: 19, left: "Kitchen", right: "Fridge", leftImg: "https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1584622181563-430f63602d4b?w=300&h=300&fit=crop" },
                { id: 20, left: "Bike", right: "Helmet", leftImg: "https://images.unsplash.com/photo-1555147541-2ec63f56e718?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1576425752846-d8269d373268?w=300&h=300&fit=crop" }
            ],
            hard: [
                { id: 21, left: "Sun", right: "Moon", leftImg: "https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=300&h=300&fit=crop" },
                { id: 22, left: "Fire", right: "Smoke", leftImg: "https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1519904981063-b0cf448d479e?w=300&h=300&fit=crop" },
                { id: 23, left: "Question", right: "Answer", leftImg: "https://images.unsplash.com/photo-1516979187457-635ffe35ff15?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=300&h=300&fit=crop" },
                { id: 24, left: "Day", right: "Night", leftImg: "https://images.unsplash.com/photo-1495562569060-2b7279351cac?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=300&h=300&fit=crop" },
                { id: 25, left: "Hot", right: "Cold", leftImg: "https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1517938753464-5618bc2830fc?w=300&h=300&fit=crop" },
                { id: 26, left: "Buy", right: "Sell", leftImg: "https://images.unsplash.com/photo-1555636222-cae831c7a47f?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1557821552-17105176677c?w=300&h=300&fit=crop" },
                { id: 27, left: "Parent", right: "Child", leftImg: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1503454537688-e47546fe5188?w=300&h=300&fit=crop" },
                { id: 28, left: "Open", right: "Close", leftImg: "https://images.unsplash.com/photo-1533357489199-f8466ab73fea?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1533694352444-78bb66068463?w=300&h=300&fit=crop" },
                { id: 29, left: "Before", right: "After", leftImg: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1495562569060-2b7279351cac?w=300&h=300&fit=crop" },
                { id: 30, left: "Give", right: "Take", leftImg: "https://images.unsplash.com/photo-1576091160550-112173f31c77?w=300&h=300&fit=crop", rightImg: "https://images.unsplash.com/photo-1552817632-5b53e1faa6d4?w=300&h=300&fit=crop" }
            ]
        };

        let currentLevel = "easy";
        let draggedItem = null;
        let matches = [];

        function shuffle(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function renderGame() {
            matches = [];
            document.getElementById("feedback").classList.remove("show");
            document.getElementById("completion").classList.remove("show");

            const pairs = gameData[currentLevel];
            const leftItems = shuffle([...pairs]);
            const rightItems = shuffle([...pairs]);

            // Render left (draggable with images)
            const leftContainer = document.getElementById("left-items");
            leftContainer.innerHTML = "";
            leftItems.forEach(item => {
                const div = document.createElement("div");
                div.className = "card draggable";
                div.dataset.id = item.id;
                div.draggable = true;

                div.innerHTML = `
                    <img class="card-image" src="${item.leftImg}" alt="${item.left}">
                    <div class="card-label">${item.left}</div>
                `;

                div.addEventListener("dragstart", (e) => {
                    draggedItem = item;
                    e.dataTransfer.effectAllowed = "copy";
                    e.dataTransfer.setDragImage(div, 0, 0);
                });

                div.addEventListener("dragend", (e) => {
                    draggedItem = null;
                });

                leftContainer.appendChild(div);
            });

            // Render right (drop zones with images for matched)
            const rightContainer = document.getElementById("right-items");
            rightContainer.innerHTML = "";
            rightItems.forEach(item => {
                const div = document.createElement("div");
                div.className = "drop-zone";
                div.dataset.id = item.id;

                div.innerHTML = `
                    <img class="drop-zone-image" src="${item.rightImg}" alt="${item.right}">
                    <div class="drop-zone-label">${item.right}</div>
                `;

                div.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = "copy";
                    div.classList.add("drag-over");
                });

                div.addEventListener("dragleave", () => {
                    div.classList.remove("drag-over");
                });

                div.addEventListener("drop", (e) => {
                    e.preventDefault();
                    div.classList.remove("drag-over");

                    if (!draggedItem) return;

                    if (draggedItem.id == item.id) {
                        matches.push(item.id);
                        showFeedback("✅ Ka pai! Correct match!", true);
                        playSound(true);
                        updateUI();
                    } else {
                        showFeedback("❌ Try again — think about what goes together.", false);
                        playSound(false);
                    }

                    draggedItem = null;
                });

                rightContainer.appendChild(div);
            });
        }

        function updateUI() {
            const pairs = gameData[currentLevel];

            // Update left items
            document.querySelectorAll(".draggable").forEach(el => {
                if (matches.includes(parseInt(el.dataset.id))) {
                    el.classList.add("matched");
                } else {
                    el.classList.remove("matched");
                }
            });

            // Update right items
            document.querySelectorAll(".drop-zone").forEach(el => {
                if (matches.includes(parseInt(el.dataset.id))) {
                    el.classList.add("matched");
                } else {
                    el.classList.remove("matched");
                }
            });

            // Check completion
            if (matches.length === pairs.length) {
                document.getElementById("completion").classList.add("show");
            }
        }

        function showFeedback(message, isCorrect) {
            const fb = document.getElementById("feedback");
            fb.textContent = message;
            fb.classList.add("show");
            setTimeout(() => fb.classList.remove("show"), 2000);
        }

        function playSound(isCorrect) {
            const url = isCorrect
                ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
                : "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg";
            new Audio(url).play().catch(() => {});
        }

        // Level button listeners
        document.querySelectorAll(".level-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentLevel = btn.dataset.level;
                renderGame();
            });
        });

        // Initial render
        renderGame();
    </script>
</body>
</html>
